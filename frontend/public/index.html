<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="theme-color" content="#EB8A2C" />
        <meta
            name="description"
            content="Toothfully Yours — Cosmetic and comprehensive dentistry by Dr. Amruta Godbole, NYU-trained. Khar West, Mumbai."
        />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=DM+Sans:wght@300;400;500;600;700&family=Inter:wght@600&display=swap"
            rel="stylesheet"
        />
        <title>Toothfully Yours — Cosmetic & Comprehensive Dentistry</title>
        <script>
            window.addEventListener(
                "error",
                function (e) {
                    if (
                        e.error instanceof DOMException &&
                        e.error.name === "DataCloneError" &&
                        e.message &&
                        e.message.includes("PerformanceServerTiming")
                    ) {
                        e.stopImmediatePropagation();
                        e.preventDefault();
                    }
                },
                true,
            );
        </script>
        <script src="https://assets.emergent.sh/scripts/emergent-main.js"></script>
    </head>
    <body>
        <noscript>You need to enable JavaScript to run this app.</noscript>

        <!-- Hidden static form so Netlify can detect it at build time -->
        <form
            name="contact"
            netlify
            netlify-honeypot="bot-field"
            hidden
        >
            <input type="text" name="name" />
            <input type="tel" name="phone" />
            <input type="email" name="email" />
            <select name="service">
                <option value="Cosmetic & Aesthetic Care"></option>
                <option value="Implants & Restoration"></option>
                <option value="Corrective Alignment"></option>
                <option value="Neuromuscular Dentistry"></option>
                <option value="General Checkup"></option>
            </select>
            <textarea name="message"></textarea>
        </form>

        <div id="root"></div>
    </body>
</html>
